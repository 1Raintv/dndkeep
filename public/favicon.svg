<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- v2.508.0 — DNDKeep favicon: d20 in brand gold on the dark app
       background. Mirrors the PWA PNG icon set (public/icon-192.png /
       icon-512.png). viewBox 0 0 100 100; d20 centered. -->
  <rect width="100" height="100" rx="18" fill="#0d0b09"/>
  <!-- Hexagon silhouette (point-up), radius 34 about center (50,50). -->
  <g stroke="#0d0b09" stroke-width="2.2" stroke-linejoin="round">
    <!-- Facet wedges: alternating light/dark for a 3D read. -->
    <polygon points="50,50 50,16 79.44,33" fill="#e0b25c"/>
    <polygon points="50,50 79.44,33 79.44,67" fill="#96691a"/>
    <polygon points="50,50 79.44,67 50,84" fill="#e0b25c"/>
    <polygon points="50,50 50,84 20.56,67" fill="#96691a"/>
    <polygon points="50,50 20.56,67 20.56,33" fill="#e0b25c"/>
    <polygon points="50,50 20.56,33 50,16" fill="#96691a"/>
    <!-- Top face triangle. -->
    <polygon points="50,26 67.7,56 32.3,56" fill="#c9922a"/>
  </g>
  <!-- The "20". -->
  <text x="50" y="50" font-family="DejaVu Sans, Arial, sans-serif"
        font-size="20" font-weight="bold" fill="#0d0b09"
        text-anchor="middle" dominant-baseline="middle">20</text>
</svg>
